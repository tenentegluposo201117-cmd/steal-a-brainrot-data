<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steal a Brainrot Guide</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#14001f,#2a004d);
color:white;
text-align:center;
}

h1{
color:#00eaff;
text-shadow:0 0 20px #00eaff;
margin-top:20px;
}

.card{
background:#25003d;
margin:15px;
padding:15px;
border-radius:15px;
box-shadow:0 0 20px #00eaff44;
}

button{
background:#00eaff;
border:none;
padding:10px 18px;
border-radius:10px;
font-weight:bold;
margin:5px;
}

.section{
display:none;
}

.active{
display:block;
}
</style>
</head>

<body>

<h1>STEAL A BRAINROT GUIDE</h1>

<div>
<button onclick="showSection('home')">Home</button>
<button onclick="showSection('brainrots')">Brainrots</button>
<button onclick="showSection('traits')">Traits</button>
<button onclick="showSection('mutations')">Mutations</button>
<button onclick="showSection('leaks')">Leaks</button>
</div>

<div id="home" class="section active card">
<h2>Statistics</h2>
<p id="brainrotCount">Loading...</p>
<p id="traitCount">Loading...</p>
<p id="mutationCount">Loading...</p>

<h3>Join Discord</h3>
<button onclick="window.location.href='SEULINKDISCORD'">
Open Discord
</button>
</div>

<div id="brainrots" class="section card">
<h2>Brainrots</h2>
<div id="brainrotList">Loading...</div>
</div>

<div id="traits" class="section card">
<h2>Traits</h2>
<div id="traitList">Loading...</div>
</div>

<div id="mutations" class="section card">
<h2>Mutations</h2>
<div id="mutationList">Loading...</div>
</div>

<div id="leaks" class="section card">
<h2>Skibidi Leaks</h2>
<div id="leakList">Loading...</div>
</div>

<script>

function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function loadData(){

  const brainrots = await fetch(`https://raw.githubusercontent.com/tenentegluposo201117-cmd/steal-a-brainrot-data/main/brainrots.json`).then(r=>r.json());
  const traits = await fetch(`https://raw.githubusercontent.com/tenentegluposo201117-cmd/steal-a-brainrot-data/main/traits.json`).then(r=>r.json());
  const mutations = await fetch(`https://raw.githubusercontent.com/tenentegluposo201117-cmd/steal-a-brainrot-data/main/mutations.json`).then(r=>r.json());
  const leaks = await fetch(`https://raw.githubusercontent.com/tenentegluposo201117-cmd/steal-a-brainrot-data/main/leaks.json`).then(r=>r.json());

  document.getElementById("brainrotCount").innerText = "Brainrots: " + brainrots.length;
  document.getElementById("traitCount").innerText = "Traits: " + traits.length;
  document.getElementById("mutationCount").innerText = "Mutations: " + mutations.length;

  let brainrotHTML="";
  brainrots.forEach(b=>{
    brainrotHTML+=`<p>${b.name} (${b.rarity}) - ${b.income}/s</p>`;
  });
  document.getElementById("brainrotList").innerHTML=brainrotHTML;

  let traitHTML="";
  traits.forEach(t=>{
    traitHTML+=`<p>${t.name} - ${t.multiplier}x</p>`;
  });
  document.getElementById("traitList").innerHTML=traitHTML;

  let mutationHTML="";
  mutations.forEach(m=>{
    mutationHTML+=`<p>${m.name} - ${m.multiplier}x</p>`;
  });
  document.getElementById("mutationList").innerHTML=mutationHTML;

  let leakHTML="";
  leaks.forEach(l=>{
    leakHTML+=`<p><b>${l.title}</b><br>${l.description}<br><small>${l.date}</small></p><hr>`;
  });
  document.getElementById("leakList").innerHTML=leakHTML;

}

loadData();

</script>

</body>
</html>
